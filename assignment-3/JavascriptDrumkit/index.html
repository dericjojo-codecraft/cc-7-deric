<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>JS Drum Kit</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div id="controls">
    <div class="control-board" id="playback-control">
      <h2>PLAYBACK</h2>
      <div class="control-btns">
        <button class="control-btn" id="stop-playback" data-action="RESTART_PLAYBACK">
          <kbd>Stop</kbd>
          <span class="sound">ctrl + Q</span>
        </button>
        <button class="control-btn" id="start-playback" data-action="START_PLAYBACK">
          <kbd>Start</kbd>
          <span class="sound">ctrl + W</span>
        </button>
        <button class="control-btn" id="pause-playback" data-action="TOGGLE_PLAYBACK">
          <kbd>Pause</kbd>
          <span class="sound">ctrl + E</span>
        </button>
      </div>
    </div>

    <h1 id="state-str">STUDIO STATE: FREEPLAY</h1>

    <div class="control-board" id="record-control">
      <h2>RECORD</h2>
      <div class="control-btns">
        <button class="control-btn" id="reset-recording" data-action="RESET_SESSION">
          <kbd>Reset</kbd>
          <span class="sound">ctrl + U</span>
        </button>
        <button class="control-btn" id="stop-recording" data-action="STOP_RECORDING">
          <kbd>Stop</kbd>
          <span class="sound">ctrl + I</span>
        </button>
        <button class="control-btn" id="resume-recording" data-action="START_RECORDING">
          <kbd>Start</kbd>
          <span class="sound">ctrl + O</span>
        </button>
        <button class="control-btn" id="pause-recording" data-action="TOGGLE_RECORDING">
          <kbd>Pause</kbd>
          <span class="sound">ctrl + P</span>
        </button>
      </div>
    </div>
  </div>

  <div id="beats-selected">
    <ul id="beats-list"></ul>
  </div>

  <div id="big-content">
    <div id="progress-bar"></div>
    <h2 id="beat-counter"></h2>
    <div class="keys">
      <button data-key="65" class="key">
        <kbd>clap</kbd>
        <span class="sound">A</span>
      </button>
      <button data-key="83" class="key">
        <kbd>hihat</kbd>
        <span class="sound">S</span>
      </button>
      <button data-key="68" class="key">
        <kbd>kick</kbd>
        <span class="sound">D</span>
      </button>
      <button data-key="70" class="key">
        <kbd>openhat</kbd>
        <span class="sound">F</span>
      </button>
      <button data-key="71" class="key">
        <kbd>boom</kbd>
        <span class="sound">G</span>
      </button>
      <button data-key="72" class="key">
        <kbd>ride</kbd>
        <span class="sound">H</span>
      </button>
      <button data-key="74" class="key">
        <kbd>snare</kbd>
        <span class="sound">J</span>
      </button>
      <button data-key="75" class="key">
        <kbd>tom</kbd>
        <span class="sound">K</span>
      </button>
      <button data-key="76" class="key">
        <kbd>tink</kbd>
        <span class="sound">L</span>
      </button>
    </div>
  </div>

  <script type="module" src="./script.js"></script>

</body>

</html>
