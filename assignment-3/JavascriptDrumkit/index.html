<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>JS Drum Kit</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div id="controls">
    <div class="control-board" id="playback-control">
      <p>PLAYBACK CONTROL</p>
      <div class="control-btns">
        <div class="control-btn" id="stop-playback">
          <kbd>Q</kbd>
          <span class="sound">Stop</span>
        </div>
        <div class="control-btn" id="start-playback">
          <kbd>W</kbd>
          <span class="sound">Start</span>
        </div>
        <div class="control-btn" id="pause-playback">
          <kbd>E</kbd>
          <span class="sound">Pause/Resume</span>
        </div>
      </div>
    </div>

    <h1 id="state-str">STUDIO STATE: FREEPLAY</h1>

    <div class="control-board" id="record-control">
      <p>RECORDING CONTROL</p>
      <div class="control-btns">
        <div class="control-btn" id="reset-recording">
          <kbd>U</kbd>
          <span class="sound">Reset</span>
        </div>
        <div class="control-btn" id="stop-recording">
          <kbd>I</kbd>
          <span class="sound">Stop</span>
        </div>
        <div class="control-btn" id="resume-recording">
          <kbd>O</kbd>
          <span class="sound">Start</span>
        </div>
        <div class="control-btn" id="pause-recording">
          <kbd>P</kbd>
          <span class="sound">Pause/Resume</span>
        </div>
      </div>
    </div>
  </div>

  <div id="beats-selected">
    <ul id="beats-list"></ul>
  </div>

  <div id="big-content">
    <div id="progress-bar"></div>
    <h2 id="beat-counter"></h2>
    <div class="keys">
      <div data-key="65" class="key">
        <kbd>A</kbd>
        <span class="sound">clap</span>
      </div>
      <div data-key="83" class="key">
        <kbd>S</kbd>
        <span class="sound">hihat</span>
      </div>
      <div data-key="68" class="key">
        <kbd>D</kbd>
        <span class="sound">kick</span>
      </div>
      <div data-key="70" class="key">
        <kbd>F</kbd>
        <span class="sound">openhat</span>
      </div>
      <div data-key="71" class="key">
        <kbd>G</kbd>
        <span class="sound">boom</span>
      </div>
      <div data-key="72" class="key">
        <kbd>H</kbd>
        <span class="sound">ride</span>
      </div>
      <div data-key="74" class="key">
        <kbd>J</kbd>
        <span class="sound">snare</span>
      </div>
      <div data-key="75" class="key">
        <kbd>K</kbd>
        <span class="sound">tom</span>
      </div>
      <div data-key="76" class="key">
        <kbd>L</kbd>
        <span class="sound">tink</span>
      </div>
    </div>
  </div>

  <script type="module" src="./script.js"></script>

</body>

</html>
